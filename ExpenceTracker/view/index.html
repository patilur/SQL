<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <title>Expense Tracker</title>
</head>

<body>
  <div class="container col-md-6">
    <div class="text-center mb-4">
      <h1>Expense Tracker</h1>
    </div>

    <form onsubmit="onSubmitHandler(event)">
      <label for="expense" class="form-label">Choose Expense amount</label>
      <input type="number" id="expense" name="expense" class="form-control">
      <label for="desc" class="form-label">Choose description</label>
      <input type="text" id="desc" name="desc" class="form-control">
      <label for="category" class="form-label">Choose a category</label>
      <select id="category" name="category" class="form-select">
        <option value="">--Select Category--</option>
        <option value="food">Food</option>
        <option value="travel">Travel</option>
        <option value="shopping">Shopping</option>
        <option value="rent">Rent</option>
        <option value="electricity">Electricity</option>
      </select>
      <button type="submit" class="primary">Submit</button>
    </form>
    <h3>Expenses List</h3>
    <ul id="expenseList"></ul>
  </div>
</body>
<!-- Do not touch the below line. Write your javascript code in index.js-->

<script src="/js/expense.js"></script>

</html>
