<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>

    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #buyPremiumBtn {
            font-weight: bold;
        }

        #leaderboardBtn {
            display: none;
        }

        .d-flex {
            display: flex !important;
            flex-direction: row !important;
        }
    </style>

</head>

<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1">MyTracker</span>

            <div class="d-flex align-items-center">
                <button id="buyPremiumBtn" class="btn btn-warning">
                    Buy Premium
                </button>
                <button id="logoutBtn" class="btn btn-outline-danger ms-2">
                    Logout
                </button>
            </div>
        </div>
    </nav>


    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card p-4 shadow">

                    <h3 class="text-center mb-4">Expense Tracker</h3>

                    <form onsubmit="onSubmitHandler(event)">

                        <div class="mb-3">

                            <label class="form-label">Expense Amount</label>

                            <input type="number" id="expense" class="form-control" placeholder="Enter amount" required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Description</label>

                            <input type="text" id="desc" class="form-control" placeholder="Enter description" required>
                            <button type="button" id="suggestBtn" class="btn btn-info ms-2">
                                Suggest Category
                            </button>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Category</label>

                            <input type="text" id="category" class="form-control" placeholder="Auto-filled by AI"
                                readonly required>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select id="type" class="form-select" required>
                                <option value="">--Select Type--</option>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Add Expense
                        </button>

                    </form>

                </div>


                <!-- EXPENSE LIST -->

                <div class="card p-3 shadow mt-4">

                    <h5 class="text-center mb-3">Expenses List</h5>

                    <ul id="expenseList" class="list-group"></ul>

                </div>
                <!-- SUMMARY SECTION -->
                <div class="card p-3 shadow mt-4">
                    <h5 class="text-center mb-3">Summary</h5>

                    <div class="d-flex justify-content-between">
                        <span>Total Income:</span>
                        <span class="text-success fw-bold">₹<span id="totalIncome">0</span></span>
                    </div>

                    <div class="d-flex justify-content-between mt-2">
                        <span>Total Expense:</span>
                        <span class="text-danger fw-bold">₹<span id="totalExpense">0</span></span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between">
                        <span><strong>Balance:</strong></span>
                        <span class="fw-bold">₹<span id="balance">0</span></span>
                    </div>
                </div>


                <div id="premiumSection" style="display:none;" class="card p-3 mt-4 shadow">

                    <h5 class="text-center">Premium Features</h5>

                    <div class="d-flex justify-content-between my-3">
                        <button class="btn btn-outline-primary" onclick="filterExpenses('daily')">Daily</button>
                        <button class="btn btn-outline-primary" onclick="filterExpenses('weekly')">Weekly</button>
                        <button class="btn btn-outline-primary" onclick="filterExpenses('monthly')">Monthly</button>
                    </div>

                    <button id="downloadBtn" class="btn btn-success mb-3">
                        Download Expenses
                    </button>

                    <ul id="filteredList" class="list-group"></ul>
                </div>

                <div class="text-center mt-4">

                    <h4 id="premiumMessage" style="color:green;"></h4>

                    <button id="leaderboardBtn" class="btn btn-warning mt-2">
                        Show Leaderboard
                    </button>

                </div>


                <!-- LEADERBOARD -->

                <div class="card p-3 shadow mt-3">

                    <h5 class="text-center">Leaderboard</h5>

                    <ul id="leaderboardList" class="list-group"></ul>

                </div>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/expense.js"></script>

</body>

</html>
