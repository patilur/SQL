<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card p-4 shadow">

                    <h3 class="text-center mb-4">Expense Tracker</h3>

                    <form onsubmit="onSubmitHandler(event)">

                        <div class="mb-3">
                            <label class="form-label">Expense Amount</label>
                            <input type="number" id="expense" class="form-control" placeholder="Enter amount">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" id="desc" class="form-control" placeholder="Enter description">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="category" class="form-select">
                                <option value="">--Select Category--</option>
                                <option value="food">Food</option>
                                <option value="travel">Travel</option>
                                <option value="shopping">Shopping</option>
                                <option value="rent">Rent</option>
                                <option value="electricity">Electricity</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Add Expense
                        </button>

                    </form>

                </div>

                <!-- Expense List Card -->
                <div class="card p-3 shadow mt-4">
                    <h5 class="text-center mb-3">Expenses List</h5>
                    <ul id="expenseList" class="list-group"></ul>
                </div>
                <h4 id="premiumMessage" style="color:green;"></h4>
                <button id="leaderboardBtn" class="btn btn-warning">Show Leaderboard</button>

                <ul id="leaderboardList"></ul>
            </div>

        </div>
    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/expense.js"></script>

</html>
