<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blog App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {

            background-color: #f5f5f5;
        }



        input {
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container mt-4">

        <div class="row">

            <!-- Left side : Blog Form -->
            <div class="col-md-4">

                <h3>Create a New Blog Post</h3>

                <form onsubmit="onSubmitHandler(event)">

                    <label>Blog Title</label>
                    <input type="text" id="title" class="form-control mb-2">

                    <label>Blog Author</label>
                    <input type="text" id="author" class="form-control mb-2">

                    <label>Blog Content</label>
                    <textarea id="content" class="form-control mb-2"></textarea>

                    <button class="btn btn-primary mt-2">Submit</button>

                </form>

            </div>

            <!-- Right side : Blog Display -->
            <div class="col-md-8">

                <h3>Blogs</h3>

                <div id="blogContainer">

                    <!-- Blogs will appear here -->

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/blog.js"></script>

</body>

</html>
