<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cashfree Inline Modal Checkout</title>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        /* Modal container */
        #payment-container {
            display: none;
            /* hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* Inner modal box */
        #payment-container .modal-box {
            width: 400px;
            max-width: 90%;
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Close button */
        #payment-container .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Buy Premium Membership</h2>
    <button id="buyPremium">Buy Premium</button>

    <!-- Modal container -->
    <div id="payment-container">
        <div class="modal-box">
            <span class="close-btn" id="closeModal">&times;</span>
            <div id="cashfree-modal"></div> <!-- Cashfree renders inside here -->
        </div>
    </div>

    <script>
        const cashfree = Cashfree({ mode: "sandbox" });

        const container = document.getElementById("payment-container");
        const closeBtn = document.getElementById("closeModal");

        closeBtn.addEventListener("click", () => {
            container.style.display = "none"; // close modal
        });

        document.getElementById("buyPremium").addEventListener("click", async () => {
            try {
                // 1️⃣ Create order on backend
                const response = await fetch("/pay", { method: "POST" });
                const data = await response.json();

                const orderId = data.orderId;
                const paymentSessionId = data.paymentSessionId;

                // 2️⃣ Show modal
                container.style.display = "flex";

                // 3️⃣ Cashfree inline modal checkout
                const checkoutOptions = {
                    paymentSessionId: paymentSessionId,
                    redirectTarget: "#cashfree-modal" // Render inside modal div
                };

                const result = await cashfree.checkout(checkoutOptions);

                // 4️⃣ Handle result
                if (result.error) {
                    console.log("Payment error or modal closed", result.error);
                    alert("Transaction failed!");
                    container.style.display = "none"; // hide modal
                }

                if (result.paymentDetails) {
                    console.log("Payment completed:", result.paymentDetails.paymentMessage);

                    // Check status from backend
                    const statusRes = await fetch(`/payment-status/${orderId}`);
                    const statusData = await statusRes.json();

                    alert(statusData.orderStatus === "SUCCESS" ?
                        "Transaction Successful! Premium activated." :
                        "Transaction Failed");

                    container.style.display = "none"; // hide modal
                }

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Payment failed!");
                container.style.display = "none";
            }
        });
    </script>

</body>

</html>
